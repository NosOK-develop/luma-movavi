{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8 bg-white text-dark p-4 rounded shadow-sm border">
            <h1 class="text-center text-luma">{{ post.title }}</h1>
            <div>
                {{ post.text | safe }}
            </div>
            {% if current_user.id == post.author_id or current_user.role_level >= 3 %}
                <a class="btn btn-danger" href="/api/post/delete/{{ post.id }}">Удалить пост</a>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
